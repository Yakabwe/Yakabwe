<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Shooter — Yakabwè</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b0f1a;
      overflow: hidden;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
    }

    canvas {
      background: #070a12;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      touch-action: none;
      width: min(420px, calc(100vw - 16px));
      height: auto;
      max-height: calc(100vh - 16px);
      display: block;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      color: #e8eefc;
      font: 13px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: rgba(0,0,0,.28);
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.10);
      user-select: none;
      max-width: calc(100vw - 20px);
      box-sizing: border-box;
    }

    .hud b { font-weight: 700; }
    .hint { opacity: .75; margin-top: 4px; font-size: 11px; }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(0,0,0,.6);
      color: #fff;
      font: 16px system-ui;
      padding: 24px;
      z-index: 30;
    }

    .overlay .card {
      background: rgba(12,16,28,.95);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 18px 18px 14px;
      width: min(520px, 92vw);
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .overlay h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .overlay button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 0;
      background: #ffffff;
      color: #0b0f1a;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
    }

    .overlay .small {
      opacity: .8;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div>Score : <b id="score">0</b> • Vie : <b id="hp">3</b></div>
    <div class="hint">← → bouger • Espace tirer • R recommencer</div>
  </div>

  <div class="wrap">
    <canvas id="c" width="420" height="720"></canvas>
  </div>

  <div class="overlay" id="over">
    <div class="card">
      <h2>Game Over</h2>
      <div style="opacity:.9">Ton score : <b id="finalScore">0</b></div>
      <div class="small">Notez votre score</div>
      <div class="small">Descendez sur la page !</div>
      <button id="restart">Rejouer</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const hpEl = document.getElementById("hp");
    const overlay = document.getElementById("over");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restart");

    let W = canvas.width, H = canvas.height;
    let keys = new Set();
    let running = true;

    const player = { x: W/2, y: H-70, w: 44, h: 20, speed: 6, cooldown: 0, hp: 3 };
    let bullets = [];
    let enemies = [];
    let particles = [];
    let score = 0;
    let spawnTimer = 0;
    let difficulty = 1;

    const bottleImg = new Image();
    bottleImg.src = "assets/bouteille.png";
    let bottleReady = false;

    bottleImg.onload = () => { bottleReady = true; };
    bottleImg.onerror = () => { console.warn("Image bouteille introuvable :", bottleImg.src); };

    function reset() {
      running = true;
      overlay.style.display = "none";
      bullets = [];
      enemies = [];
      particles = [];
      score = 0;
      difficulty = 1;
      spawnTimer = 0;
      player.x = W/2;
      player.hp = 3;
      player.cooldown = 0;
      scoreEl.textContent = score;
      hpEl.textContent = player.hp;
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyR") reset();
      keys.add(e.code);
      if (["ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
    }, { passive: false });

    window.addEventListener("keyup", (e) => keys.delete(e.code));

    let pointerDown = false;
    let pointerX = null;

    function toCanvasX(clientX) {
      const r = canvas.getBoundingClientRect();
      return (clientX - r.left) * (canvas.width / r.width);
    }

    canvas.addEventListener("pointerdown", (e) => {
      pointerDown = true;
      pointerX = toCanvasX(e.clientX);
      shoot();
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!pointerDown) return;
      pointerX = toCanvasX(e.clientX);
    });

    window.addEventListener("pointerup", () => {
      pointerDown = false;
      pointerX = null;
    });

    function shoot() {
      if (!running) return;
      if (player.cooldown > 0) return;
      bullets.push({ x: player.x, y: player.y - 18, r: 4, vy: -9 });
      player.cooldown = 10;
    }

    function tick() {
      update();
      draw();
      requestAnimationFrame(tick);
    }

    function update() {
      if (!running) return;

      difficulty = 1 + Math.floor(score / 400);

      if (keys.has("ArrowLeft")) player.x -= player.speed;
      if (keys.has("ArrowRight")) player.x += player.speed;
      if (keys.has("Space")) shoot();

      if (pointerX !== null) {
        player.x += (pointerX - player.x) * 0.25;
      }

      player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

      if (player.cooldown > 0) player.cooldown--;

      spawnTimer--;
      const baseSpawn = Math.max(18, 42 - difficulty * 4);

      if (spawnTimer <= 0) {
        spawnTimer = baseSpawn;

        const w = 50;
        const h = 70;

        enemies.push({
          x: 24 + Math.random() * (W - 48),
          y: -50,
          w, h,
          vy: 2.0 + Math.random() * 1.2 + difficulty * 0.25,
          hp: 1 + Math.floor(difficulty / 3)
        });
      }

      for (const b of bullets) b.y += b.vy;
      bullets = bullets.filter(b => b.y > -20);

      for (const en of enemies) en.y += en.vy;

      for (let i = enemies.length - 1; i >= 0; i--) {
        const en = enemies[i];

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (circleRect(b.x, b.y, b.r, en.x - en.w/2, en.y - en.h/2, en.w, en.h)) {
            bullets.splice(j, 1);
            en.hp -= 1;
            burst(en.x, en.y, 8);

            if (en.hp <= 0) {
              enemies.splice(i, 1);
              score += 25;
              scoreEl.textContent = score;
              burst(en.x, en.y, 18);
            }
            break;
          }
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const en = enemies[i];

        if (rectsOverlap(
          en.x - en.w/2, en.y - en.h/2, en.w, en.h,
          player.x - player.w/2, player.y - player.h/2, player.w, player.h
        )) {
          enemies.splice(i, 1);
          damage();
          burst(player.x, player.y, 25);
          continue;
        }

        if (en.y - en.h/2 > H + 10) {
          enemies.splice(i, 1);
          damage();
        }
      }

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function damage() {
      player.hp -= 1;
      hpEl.textContent = player.hp;
      if (player.hp <= 0) endGame();
    }

    function endGame() {
      running = false;
      finalScoreEl.textContent = score;
      overlay.style.display = "flex";
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#070a12";
      ctx.fillRect(0, 0, W, H);

      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = "#ffffff";
      for (let x = 0; x <= W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y <= H; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      drawShip(player.x, player.y);

      ctx.fillStyle = "#e8eefc";
      for (const b of bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const en of enemies) {
        const x = en.x - en.w / 2;
        const y = en.y - en.h / 2;

        if (bottleReady) {
          ctx.drawImage(bottleImg, x, y, en.w, en.h);
        } else {
          ctx.fillStyle = "#ff6b6b";
          ctx.beginPath();
          ctx.roundRect(x, y, en.w, en.h, 8);
          ctx.fill();
        }

        if (en.hp > 1) {
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = "#0b0f1a";
          ctx.font = "12px system-ui";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(en.hp), en.x, en.y);
          ctx.globalAlpha = 1;
        }
      }

      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(p.x, p.y, 2, 2);
      }
      ctx.globalAlpha = 1;
    }

    function drawShip(x, y) {
      ctx.save();
      ctx.translate(x, y);

      ctx.fillStyle = "#6ee7ff";
      ctx.beginPath();
      ctx.roundRect(-22, -10, 44, 20, 10);
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.beginPath();
      ctx.roundRect(-8, -6, 16, 12, 6);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.roundRect(-10, 12, 20, 14, 7);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function circleRect(cx, cy, r, rx, ry, rw, rh) {
      const nearestX = Math.max(rx, Math.min(cx, rx + rw));
      const nearestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nearestX;
      const dy = cy - nearestY;
      return (dx * dx + dy * dy) <= r * r;
    }

    function burst(x, y, n) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 0.7 + Math.random() * 2.4;
        particles.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 18 + Math.floor(Math.random() * 18),
          maxLife: 36
        });
      }
    }

    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
      }
    }

    restartBtn.addEventListener("click", reset);

    reset();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
